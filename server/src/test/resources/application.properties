# 테스트는 설치가 필요 없는 H2(메모리)로 실행한다. (GitHub CI 포함)
# → MySQL이 없어도 gradlew build / 테스트가 통과한다.
spring.datasource.url=jdbc:h2:mem:ovenup;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
# 대부분의 주문 테스트는 위치와 무관하므로 위치 필수를 끈다.
# (위치 필수/차단 동작은 BuildingLocationOrderTest가 켠 상태로 따로 검증)
app.building.require-location=false
