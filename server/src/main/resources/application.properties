spring.application.name=server

# ==== 기본 DB: MySQL ====
# 로컬에 MySQL이 실행 중이어야 합니다. (준비가 안 됐으면 아래 h2 프로필로 실행)
#   MySQL 없이 실행:  ./gradlew bootRun --args='--spring.profiles.active=h2'
# 접속 정보는 환경변수(DB_URL/DB_USERNAME/DB_PASSWORD)로 덮어쓸 수 있고,
# 비밀번호는 코드에 두지 않습니다(환경변수 사용). 설정법: 문서 레포 '가이드/로컬_MySQL_연결.md'
# useSSL=false, allowPublicKeyRetrieval=true 는 로컬 개발용(평문 접속) 설정.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ovenup?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ==== 소셜 로그인 ====
# 기본은 mock 모드: 실제 카카오/네이버 호출 없이 흐름을 확인한다(앱 등록/키 불필요).
# 실제 연동 시 false 로 바꾼다(RealSocialProfileVerifier 사용). 가이드: 문서 레포 '가이드/소셜로그인_연결.md'
app.social.mock=true
# 실제 모드에서 쓰는 키 — 값은 환경변수로만 주입(커밋 금지). 기본은 빈 값.
app.social.kakao.rest-api-key=${KAKAO_REST_API_KEY:}
# 카카오 콘솔 [보안]에서 Client Secret을 "사용함"으로 켠 경우에만 필요
app.social.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
app.social.naver.client-id=${NAVER_CLIENT_ID:}
app.social.naver.client-secret=${NAVER_CLIENT_SECRET:}
# 푸시(FCM) 실제 모드용 — Firebase 서비스 계정 키 JSON 파일 "경로" (환경변수, 커밋 금지)
app.push.service-account=${FIREBASE_SERVICE_ACCOUNT:}

# ==== 결제 ====
# 기본은 mock 모드: 실제 결제창/대행사 없이 결제 완료 처리(개발 확인용).
# 실제 연동 시 false + PORTONE_API_SECRET 환경변수 설정(RealPaymentVerifier). 가이드: 문서 레포 '가이드/결제_연동.md'
app.payment.mock=true

# ==== 푸시 알림 ====
# 기본은 mock: 인앱 알림은 저장/조회되고, 실제 기기 푸시(FCM)는 로그만 남긴다.
# 실제 FCM 연동 시 false + 기기 토큰/서비스계정 설정. 가이드: 문서 레포 '가이드/푸시_알림_FCM.md'
app.push.mock=true

# ==== 적립(포인트) ====
# 결제 완료 시 결제금액의 이 비율(%)만큼 적립. 기본 1%.
app.point.earn-percent=1

# ==== 서비스 대상 건물 (건물 전용 앱) ====
# 이 앱은 상가 건물 하나(명지에코펠리스) 안에서만 쓴다.
# 주소 등록·주문 배달주소는 이 건물만 허용하고, 주문 시 앱이 보낸 GPS 좌표가 있으면 반경 안인지 확인한다.
# 건물이 바뀌면 아래 값만 수정하면 된다. (좌표: 구글지도 기준, 반경은 실내 GPS 오차 감안)
# 한글 값은 .properties 인코딩 문제를 피하려고 코드 기본값(BuildingPolicy)을 쓴다. 바꿀 때만 주석 해제.
#app.building.name=명지에코펠리스
#app.building.road-address=부산 강서구 명지국제2로28번길 34
app.building.lat=35.0928292
app.building.lng=128.9088756
app.building.radius-m=250
# 주문 시 위치(GPS) 필수 여부. true면 좌표 없는 주문을 거절한다.
app.building.require-location=true
