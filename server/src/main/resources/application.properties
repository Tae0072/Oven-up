spring.application.name=server

# ==== 기본 DB: MySQL ====
# 로컬에 MySQL이 실행 중이어야 합니다. (준비가 안 됐으면 아래 h2 프로필로 실행)
#   MySQL 없이 실행:  ./gradlew bootRun --args='--spring.profiles.active=h2'
# 접속 정보는 환경변수(DB_URL/DB_USERNAME/DB_PASSWORD)로 덮어쓸 수 있고,
# 비밀번호는 코드에 두지 않습니다(환경변수 사용). 설정법: 문서 레포 '가이드/로컬_MySQL_연결.md'
# useSSL=false, allowPublicKeyRetrieval=true 는 로컬 개발용(평문 접속) 설정.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ovenup?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ==== 소셜 로그인 ====
# 기본은 mock 모드: 실제 카카오/네이버 호출 없이 흐름을 확인한다(앱 등록/키 불필요).
# 실제 연동 시 false 로 바꾼다(RealSocialProfileVerifier 사용). 가이드: 문서 레포 '가이드/소셜로그인_연결.md'
app.social.mock=true

# ==== 결제 ====
# 기본은 mock 모드: 실제 결제창/대행사 없이 결제 완료 처리(개발 확인용).
# 실제 연동 시 false + PORTONE_API_SECRET 환경변수 설정(RealPaymentVerifier). 가이드: 문서 레포 '가이드/결제_연동.md'
app.payment.mock=true

# ==== 푸시 알림 ====
# 기본은 mock: 인앱 알림은 저장/조회되고, 실제 기기 푸시(FCM)는 로그만 남긴다.
# 실제 FCM 연동 시 false + 기기 토큰/서비스계정 설정. 가이드: 문서 레포 '가이드/푸시_알림_FCM.md'
app.push.mock=true

# ==== 적립(포인트) ====
# 결제 완료 시 결제금액의 이 비율(%)만큼 적립. 기본 1%.
app.point.earn-percent=1
