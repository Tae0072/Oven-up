spring.application.name=server

# ==== 기본 DB: H2 (메모리) ====
# 설치 없이 바로 실행/테스트할 수 있는 개발용 DB.
# 메모리 DB라 서버를 끄면 초기화되고, 다시 켜면 시더(DataInitializer)가 메뉴를 다시 채운다.
spring.datasource.url=jdbc:h2:mem:ovenup;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# 개발용 H2 웹 콘솔: 서버 실행 후 http://localhost:8080/h2-console 접속
# (JDBC URL 에 위 spring.datasource.url 그대로 입력)
spring.h2.console.enabled=true

# ==== MySQL 로 바꾸려면 ====
# 로컬에 MySQL 준비 후 아래처럼 실행:  ./gradlew bootRun --args='--spring.profiles.active=mysql'
# 자세한 방법은 문서 레포(Oven-up-repo)의 '가이드/로컬_MySQL_연결.md' 참고.
