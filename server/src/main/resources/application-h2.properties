# H2 프로필 — MySQL이 아직 준비 안 됐을 때 설치 없이 실행하는 용도.
# 실행:  ./gradlew bootRun --args='--spring.profiles.active=h2'
# 메모리 DB라 서버를 끄면 초기화되고, 시더가 메뉴를 다시 채운다.
# H2 콘솔: http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:ovenup)
spring.datasource.url=jdbc:h2:mem:ovenup;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
