# MySQL 프로필 설정
# 실행:  ./gradlew bootRun --args='--spring.profiles.active=mysql'
# 값은 환경변수(.env / 시스템 환경변수)로 덮어쓸 수 있다. 비밀번호는 코드에 직접 쓰지 말 것.
#
# 사전 준비(가이드 참고): MySQL 설치 → 데이터베이스 생성
#   CREATE DATABASE ovenup DEFAULT CHARACTER SET utf8mb4;

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ovenup?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
